<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>mhmdrynhaqqi</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #111; color: white; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .status-box {
            background: #222; padding: 12px 30px; border-radius: 50px;
            margin-bottom: 20px; font-weight: bold; border: 2px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .main-container {
            display: grid; grid-template-columns: 640px 640px; gap: 25px;
        }
        .screen {
            background: #000; padding: 10px; border-radius: 20px; border: 2px solid #333;
            position: relative; width: 640px; height: 480px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        video, canvas { width: 640px; height: 480px; border-radius: 12px; }
        #webcam { transform: rotateY(180deg); object-fit: cover; display: none; }
        #output_canvas { position: absolute; left: 10px; top: 10px; transform: rotateY(180deg); }
        #videoTarget { 
            background: black; opacity: 0.1; transition: opacity 0.3s ease; 
            object-fit: contain; width: 100%; height: 100%;
        }
        .label-text { margin-top: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="status-box" id="statusLabel">MENGINISIALISASI AI...</div>

    <div class="main-container">
        <div class="screen">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
            <div class="label-text">mhmdrynhaqqi</div>
        </div>

        <div class="screen">
            <video id="videoTarget" muted loop playsinline>
                <source src="videoplayback.mp4" type="video/mp4">
            </video>
            <div class="label-text">mhmdrynhaqqi</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const targetVideo = document.getElementById('videoTarget');
        const statusLabel = document.getElementById('statusLabel');

        let mouthArea = null;

        // --- KONFIGURASI FACE MESH (DETEKSI WAJAH) ---
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        
        faceMesh.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar gambar asli ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Area Mulut (Bounding Box)
                mouthArea = {
                    xMin: landmarks[61].x - 0.05, 
                    xMax: landmarks[291].x + 0.05,
                    yMin: landmarks[13].y - 0.08, 
                    yMax: landmarks[14].y + 0.08
                };

                // Gambar Garis Sketsa Bibir
                drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#E0E0E0', lineWidth: 2});
            }
            canvasCtx.restore();
        });

        // --- KONFIGURASI HANDS (DETEKSI TANGAN) ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        
        hands.onResults((results) => {
            let isCovered = false;

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // GAMBAR SKETSA TANGAN (Skeleton)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 4});

                    // LOGIKA: Cek apakah titik jari masuk ke area mulut
                    if (mouthArea) {
                        for (let i of [4, 8, 12, 16, 20]) {
                            const point = landmarks[i];
                            if (point.x > mouthArea.xMin && point.x < mouthArea.xMax &&
                                point.y > mouthArea.yMin && point.y < mouthArea.yMax) {
                                isCovered = true; break;
                            }
                        }
                    }
                }
            }

            // EKSEKUSI VIDEO
            if (isCovered) {
                statusLabel.innerText = "SISTEM: MULUT TERTUTUP (PLAYING)";
                statusLabel.style.color = "#FF4B4B";
                statusLabel.style.borderColor = "#FF4B4B";
                targetVideo.style.opacity = "1";
                targetVideo.play();
            } else {
                statusLabel.innerText = "SISTEM: SIAP (DETEKSI AKTIF)";
                statusLabel.style.color = "#00FF00";
                statusLabel.style.borderColor = "#444";
                targetVideo.style.opacity = "0.1";
                targetVideo.pause();
            }
        });

        // JALANKAN KAMERA
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
                await hands.send({image: videoElement});
            },
            width: 640, height: 480
        });
        camera.start().then(() => {
            statusLabel.innerText = "SISTEM SIAP: TUTUP MULUT ANDA";
        });
    </script>
</body>
</html>
